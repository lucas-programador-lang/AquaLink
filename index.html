<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaLink | Governança Hídrica</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-card">
        <header>
            <h1>AquaLink 💧</h1>
            <p>Gestão Coletiva de Reservatórios</p>
        </header>

        <section class="config">
            <div class="input-box">
                <label>Seu Nível Atual (Litros):</label>
                <input type="number" id="nivel_atual" value="500" step="50">
            </div>
            <div class="input-box">
                <label>Capacidade Total (Litros):</label>
                <input type="number" id="capacidade" value="1000">
            </div>
            <div class="input-box">
                <label>Dias para Próximo Abastecimento:</label>
                <input type="number" id="dias_espera" value="3">
            </div>
            <button id="run-btn" py-click="processar_dieta">Gerar Plano de Consumo</button>
        </section>

        <section id="dashboard" class="hidden">
            <div class="status-panel">
                <h3>Sua Cota Diária Recomendada:</h3>
                <div id="cota-valor" class="highlight">--</div>
                <p id="feedback-msg"></p>
            </div>
            
            <div class="network-view">
                <h3>Simulação de Rede (Vizinhos)</h3>
                <canvas id="bar-chart" style="width:100%; height:150px; background:#eef; border-radius:8px;"></canvas>
            </div>
        </section>

        <footer>
            <small>Processado localmente via Python Kernel (PyScript)</small>
        </footer>
    </div>

    <script type="py" src="main.py" config='{"packages":["numpy"]}'></script>
</body>
</html>
